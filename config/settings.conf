# 0 = only run from KernelSU Manager action button.
# 1 = also re-apply enabled app rules after Android boot completes.
AUTO_RUN_ON_BOOT=0

# Stop each enabled app before changing its private data directory.
FORCE_STOP_APPS=1

# Remove app_webview/app_webview_* plus cache and code_cache leftovers
# only when a target directory was newly blocked in this run.
CLEAR_APP_CACHE=1
