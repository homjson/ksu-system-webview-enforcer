# 格式说明：
#
# app 显示名称
# enabled 1
# package 应用包名
# dir 相对于 /data/data/<包名>/ 的目录路径
# dir 另一个目录（可多行）
# end
#
# enabled 1 = 锁定该 App 的私有 WebView 目录。
# enabled 0 = 保留规则但跳过不执行。
# enabled 2 = 解锁该 App 的目录，恢复为 App 自身权限。

